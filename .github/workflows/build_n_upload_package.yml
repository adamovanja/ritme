name: Build and Upload Conda Package

on:
    release:
      types: ['published', 'prereleased']

jobs:
  build-conda-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    env:
      TZ: 'UTC'
    steps:
      - uses: actions/checkout@v4
        with:
          # necessary for versioneer to derive the package version from git tags
          fetch-depth: 0
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: 'latest'
      - name: Install conda-build and anaconda-client
        run: conda install -n base -y conda-build anaconda-client
      - name: Build Conda Package
        id: build
        run: |
          # Define a separate build root outside the source directory
          CONDA_BUILD_ROOT=/tmp/conda-build
          mkdir -p $CONDA_BUILD_ROOT

          # Capture the package path without building
          PACKAGE_PATH=$(conda build --no-test \
            -c conda-forge \
            --croot $CONDA_BUILD_ROOT \
            ci/recipe --output)

          # Build the package using the specified build root
          conda build --no-test \
            -c conda-forge \
            --croot $CONDA_BUILD_ROOT \
            ci/recipe

          # Export the package path as an output variable
          echo "package_path=$PACKAGE_PATH" >> $GITHUB_OUTPUT
      - name: Upload Package to Anaconda
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
          ANACONDA_USER: adamova
        run: |
          # Upload the built package using the captured path.
          # `anaconda` lives in base/bin, but setup-miniconda@v3 activates the
          # default `test` env, so the script isn't on PATH — invoke via
          # `conda run -n base` so it resolves regardless of activation.
          conda run -n base anaconda upload --force "${{ steps.build.outputs.package_path }}" --user $ANACONDA_USER
